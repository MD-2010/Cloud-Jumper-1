<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Jumper</title>
    <script src="https://cdn.jsdelivr.net/npm/codehs-js-lib@1.0.1/dist/chs.external.min.js"></script>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: Arial, sans-serif; }
        canvas { border: 4px solid #fff; box-shadow: 0 10px 20px rgba(0,0,0,0.5); outline: none; }
    </style>
</head>
<body>

    <canvas id="canvas" width="400" height="480" tabindex="0"></canvas>

    <script>
        // Asset links
        const tree1="https://codehs.com/uploads/94feec5ba51d7de723be84d149e78901", 
              char1="https://codehs.com/uploads/040b887d0d274bb6818c21369e1a681f", 
              cloud1="https://codehs.com/uploads/e1fdcceb9c0c3c7c287f2e70ac3270be", 
              coinImg="https://codehs.com/uploads/df1388252f9a1557a4296403973044de";
        
        // Game state variables
        let obstacles=[], clouds=[], coins=[], spawnTimer=0, obstacleSpeed=-5, cloudSpeed=-1, coinCount=0, points=0, dy=0, isJumping=false, gameStarted=false, canBuyLife=false;
        let tree, cloud, coinText, buyButton, buyText, char, score, startButton, buttonText;
        const SPAWN_THRESHOLD=15, chance=5, SPEED_INC=-0.1, INC_TIME=1800, gravity=1.3, jumpForce=-16;

        // CodeHS entry point
        function start() { 
            showStartScreen(); 
        }

        function setUpGame() {
            background();
            addCharacter(); 
            setUpScore(); 
            setUpCoinTracker();
            
            keyDownMethod(e => { if (e.keyCode == Keyboard.UP && !isJumping) { dy = jumpForce; isJumping = true; } });
            mouseDownMethod(e => {
                let el = getElementAt(e.getX(), e.getY());
                if (canBuyLife && (el == buyButton || el == buyText)) revivePlayer();
                else if (gameStarted && !isJumping) { dy = jumpForce; isJumping = true; }
            });
            
            setTimer(spawnCloud, 5000); setTimer(moveCloud, 20); setTimer(spawnCoin, 2000); setTimer(moveCoin, 20);
            setTimer(applyGravity, 20); setTimer(updateScore, 100); setTimer(spawnChance, 50); setTimer(moveObstacles, 20);
            setTimer(increaseDifficulty, INC_TIME); setTimer(collisions, 20);
        }

        function setUpCoinTracker(){ coinText=new Text("Coins: "); coinText.setColor("white"); coinText.setPosition(getWidth()-110,30); add(coinText); }
        function setUpScore(){ score=new Text("0"); score.setColor("white"); score.setPosition(10,30); add(score); }
        function updateScore(){ points++; score.setText(points); }
        function increaseDifficulty(){ obstacleSpeed+=SPEED_INC; }
        function addCharacter(){ char=new WebImage(char1); char.setSize(40,40); char.setPosition(getWidth()/4,getHeight()/2-30); add(char); }

        function spawnCoin(){
            if(points<=1000) return;
            let cX = getWidth() + 50, cY = getHeight() / 2 - 25;
            if (obstacles.some(t => Math.abs(cX - t.getX()) < 100)) return;
            let coin = new WebImage(coinImg); coin.setSize(25, 25); coin.setPosition(cX, cY); add(coin); coins.push(coin);
        }

        function moveCoin(){
            for(let i=coins.length-1; i>=0; i--){
                coins[i].move(obstacleSpeed,0);
                if (coins[i].getX() < -coins[i].getWidth()) { remove(coins[i]); coins.splice(i, 1); }
            }
        }

        function showStartScreen() {
            background();
            
            let boxWidth = 320;
            let boxHeight = 160;
            let back = new Rectangle(boxWidth, boxHeight); 
            back.setPosition((getWidth() - boxWidth) / 2, (getHeight() - boxHeight) / 2);
            back.setColor("blue"); 
            add(back);
            
            let t = new Text("Cloud Jumper", "30pt Impact"); 
            t.setPosition(getWidth() / 2 - 115, getHeight() / 2 - 10); 
            t.setColor("yellow"); 
            add(t);
            
            startButton = new Rectangle(140, 50); 
            startButton.setPosition(getWidth() / 2 - 70, getHeight() / 2 + 20); 
            startButton.setColor("red"); 
            add(startButton);

            buttonText = new Text("START", "18pt Arial"); 
            buttonText.setPosition(getWidth() / 2 - 35, getHeight() / 2 + 53); 
            buttonText.setColor("white"); 
            add(buttonText);
            
            mouseMoveMethod(e => {
                if (gameStarted) return;
                let overBtn = (e.getX() > startButton.getX() && e.getX() < startButton.getX() + startButton.getWidth() && e.getY() > startButton.getY() && e.getY() < startButton.getY() + startButton.getHeight());
                startButton.setColor(overBtn ? "green" : "red");
                if (canBuyLife && buyButton) buyButton.setColor(getElementAt(e.getX(), e.getY()) == buyButton ? "orange" : "green");
            });
            
            mouseDownMethod(e => {
                let el = getElementAt(e.getX(), e.getY());
                if (!gameStarted && (el == startButton || el == buttonText)) {
                    gameStarted = true;
                    document.getElementById("canvas").focus(); 
                    removeAll(); 
                    setUpGame();
                }
            });
        }

        function spawnChance(){
            if(++spawnTimer >= SPAWN_THRESHOLD && Randomizer.nextInt(1,100) < chance){
                let cluster = Randomizer.nextInt(1,3);
                for(let i=0; i<cluster; i++) addTree(i*20);
                spawnTimer=0;
            }
        }

        function addTree(offset){
            tree = new WebImage(tree1); tree.setSize(30,40); tree.setPosition(getWidth()+offset, getHeight() / 2 - 40); add(tree); obstacles.push(tree);
        }

        function moveObstacles(){
            for(let i=obstacles.length-1; i>=0; i--){
                obstacles[i].move(obstacleSpeed,0);
                if (obstacles[i].getX() < -obstacles[i].getWidth()) { remove(obstacles[i]); obstacles.splice(i, 1); }
            }
        }

        function background(){
            let sky=new Rectangle(getWidth(),getHeight()/2); sky.setPosition(0,0); sky.setColor("lightblue"); add(sky);
            let ground=new Rectangle(getWidth(),getHeight()/2); ground.setPosition(0,getHeight()/2); ground.setColor("green"); add(ground);
        }

        function spawnCloud(){
            let sz = Randomizer.nextInt(25,50);
            cloud=new WebImage(cloud1); cloud.setSize(sz*2,sz); cloud.setPosition(getWidth(),Randomizer.nextInt(20,50)); add(cloud); clouds.push(cloud);
        }

        function moveCloud(){
            for(let i=clouds.length-1; i>=0; i--){
                clouds[i].move(cloudSpeed,0);
                if(clouds[i].getX()+clouds[i].getWidth()<0){ remove(clouds[i]); clouds.splice(i,1); }
            }
        }

        function applyGravity(){
            if(!isJumping) return;
            char.move(0,dy); dy+=gravity;
            let groundLevel=getHeight()/2-30;
            if (char.getY()>=groundLevel){ char.setPosition(char.getX(), groundLevel); dy = 0; isJumping = false; }
        }

        function collisions(){
            let buf = 16;
            let pts = [
                getElementAt(char.getX() + char.getWidth() - buf, char.getY()),
                getElementAt(char.getX() + char.getWidth() - buf, char.getY() + char.getHeight()),
                getElementAt(char.getX() + buf, char.getY() + char.getHeight()),
                getElementAt(char.getX() + char.getWidth(), char.getY() + char.getHeight()/2)
            ];
            for(let obj of pts){
                if (obj && obj != char && !clouds.includes(obj)) {
                    if (coins.includes(obj)) { collectCoin(obj); break; }
                    handleDeath(); break;
                }
            }
        }

        function collectCoin(coinObj){
            remove(coinObj);
            let idx=coins.indexOf(coinObj);
            if(idx>-1) coins.splice(idx,1);
            coinCount++;
            coinText.setText("Coins: " + coinCount);
            if (coinCount >= 3) coinText.setColor("yellow");
        }

        function handleDeath(){
            if(coinCount>=3){
                coinCount-=3; coinText.setText("Coins: "+coinCount); coinText.setColor("white");
                char.setPosition(getWidth()/4,50); dy=0; isJumping=true;
                obstacles.forEach(remove); obstacles=[];
            } else { actualGameOver(); }
        }

        function revivePlayer(){
            coinCount -= 3; canBuyLife = false; removeAll(); background(); addCharacter(); setUpScore(); setUpCoinTracker();
            score.setText(points); coinText.setText("Coins: " + coinCount);
            char.setPosition(getWidth() / 4, 50); dy = 0; isJumping = true; obstacles = []; coins = [];
            setTimer(applyGravity, 20); setTimer(updateScore, 100); setTimer(spawnChance, 50); setTimer(moveObstacles, 20);
            setTimer(collisions, 20); setTimer(spawnCloud, 5000); setTimer(moveCloud, 20); setTimer(spawnCoin, 1000); setTimer(moveCoin, 20);
        }

        function stopAllTimers(){
            stopTimer(applyGravity); stopTimer(spawnChance); stopTimer(moveObstacles); stopTimer(collisions);
            stopTimer(updateScore); stopTimer(spawnCloud); stopTimer(moveCloud); stopTimer(spawnCoin); stopTimer(moveCoin);
        }

        function actualGameOver(){
            stopAllTimers();
            let back=new Rectangle(300,200); back.setPosition(50,150); back.setColor("blue"); add(back);
            var t = new Text("GAME OVER", "30pt Impact"); t.setPosition(getWidth()/2 - 120, getHeight()/2-20); t.setColor("red"); add(t);
            var finalScore= new Text("Final Score: "+points,"20pt Impact"); finalScore.setPosition(getWidth()/2-90,getHeight()/2 + 60); finalScore.setColor("white"); add(finalScore);
            if(coinCount>=3){
                canBuyLife=true;
                buyButton = new Rectangle(160, 50); buyButton.setPosition(getWidth() / 2 - 80, getHeight() / 2 + 60); buyButton.setColor("green"); add(buyButton);
                buyText = new Text("BUY LIFE (3¢)", "15pt Arial"); buyText.setPosition(getWidth() / 2 - 70, getHeight() / 2 + 92); buyText.setColor("white"); add(buyText);
            } else {
                let noCoins = new Text("Not enough coins!", "12pt Arial"); noCoins.setPosition(getWidth() / 2 - 60, getHeight() / 2 + 80); noCoins.setColor("white"); add(noCoins);
            }
        }
    </script>
</body>
</html>
