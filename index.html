<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Jumper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #canvas-container {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="game-canvas"></canvas>
    </div>

    <script>
    // CodeHS Graphics Library Implementation
    (function() {
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');

        const WIDTH = 400;
        const HEIGHT = 400;
        canvas.width = WIDTH;
        canvas.height = HEIGHT;

        let elements = [];
        let timers = {};
        let timerIdMap = {};
        let keyDownHandler = null;
        let mouseMoveHandler = null;
        let mouseDownHandler = null;
        let timerCounter = 0;

        function getWidth() { return WIDTH; }
        function getHeight() { return HEIGHT; }

        // Color object
        const Color = {
            red: 'red',
            green: 'green',
            blue: 'blue',
            yellow: 'yellow',
            white: 'white',
            black: 'black',
            orange: 'orange',
            purple: 'purple',
            cyan: 'cyan',
            pink: 'pink'
        };

        // Keyboard constants
        const Keyboard = {
            UP: 38,
            DOWN: 40,
            LEFT: 37,
            RIGHT: 39,
            SPACE: 32
        };

        // Randomizer
        const Randomizer = {
            nextInt: function(min, max) {
                return Math.floor(Math.random() * (max - min + 1)) + min;
            },
            nextFloat: function(min, max) {
                return Math.random() * (max - min) + min;
            }
        };

        // Base graphics element
        class GraphicsElement {
            constructor() {
                this.x = 0;
                this.y = 0;
                this.width = 0;
                this.height = 0;
                this.color = 'black';
                this.visible = true;
            }
            setPosition(x, y) { this.x = x; this.y = y; }
            getX() { return this.x; }
            getY() { return this.y; }
            getWidth() { return this.width; }
            getHeight() { return this.height; }
            setColor(color) { this.color = color; }
            move(dx, dy) { this.x += dx; this.y += dy; }
            draw(ctx) {}
            containsPoint(px, py) {
                return px >= this.x && px <= this.x + this.width &&
                       py >= this.y && py <= this.y + this.height;
            }
        }

        class Rectangle extends GraphicsElement {
            constructor(width, height) {
                super();
                this.width = width || 0;
                this.height = height || 0;
                this.color = 'black';
            }
            setSize(w, h) { this.width = w; this.height = h; }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }
        }

        class Text extends GraphicsElement {
            constructor(text, font) {
                super();
                this.text = text || '';
                this.font = font || '15pt Arial';
                this.color = 'black';
                this.width = 100;
                this.height = 20;
            }
            setText(text) { this.text = String(text); }
            getText() { return this.text; }
            setFont(font) { this.font = font; }
            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.font = this.font;
                ctx.fillText(this.text, this.x, this.y);
            }
            containsPoint(px, py) {
                ctx.font = this.font;
                const w = ctx.measureText(this.text).width;
                return px >= this.x && px <= this.x + w &&
                       py >= this.y - 20 && py <= this.y;
            }
        }

        class WebImage extends GraphicsElement {
            constructor(url) {
                super();
                this.url = url;
                this.img = new Image();
                this.img.crossOrigin = 'anonymous';
                this.loaded = false;
                this.img.onload = () => { this.loaded = true; };
                this.img.src = url;
                this.width = 50;
                this.height = 50;
            }
            setSize(w, h) { this.width = w; this.height = h; }
            draw(ctx) {
                if (this.loaded) {
                    ctx.drawImage(this.img, this.x, this.y, this.width, this.height);
                } else {
                    ctx.fillStyle = '#888';
                    ctx.fillRect(this.x, this.y, this.width, this.height);
                }
            }
        }

        // Global element management
        function add(el) {
            elements.push(el);
        }

        function remove(el) {
            const idx = elements.indexOf(el);
            if (idx > -1) elements.splice(idx, 1);
        }

        function removeAll() {
            elements = [];
        }

        function getElementAt(x, y) {
            for (let i = elements.length - 1; i >= 0; i--) {
                const el = elements[i];
                if (el.containsPoint && el.containsPoint(x, y)) {
                    return el;
                }
            }
            return null;
        }

        // Timer management
        function setTimer(fn, interval) {
            const id = timerCounter++;
            const intervalId = setInterval(fn, interval);
            timers[fn.name || id] = { id, intervalId, fn };
            timerIdMap[fn.name || id] = intervalId;
            return id;
        }

        function stopTimer(fn) {
            const key = fn.name;
            if (timers[key]) {
                clearInterval(timers[key].intervalId);
                delete timers[key];
            }
        }

        // Input handlers
        function keyDownMethod(fn) {
            keyDownHandler = fn;
        }

        function mouseMoveMethod(fn) {
            mouseMoveHandler = fn;
        }

        function mouseDownMethod(fn) {
            mouseDownHandler = fn;
        }

        // Event wrappers
        function makeEvent(e, canvas) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = WIDTH / rect.width;
            const scaleY = HEIGHT / rect.height;
            return {
                getX: () => (e.clientX - rect.left) * scaleX,
                getY: () => (e.clientY - rect.top) * scaleY,
                keyCode: e.keyCode
            };
        }

        document.addEventListener('keydown', function(e) {
            if (keyDownHandler) keyDownHandler(makeEvent(e, canvas));
        });

        canvas.addEventListener('mousemove', function(e) {
            if (mouseMoveHandler) mouseMoveHandler(makeEvent(e, canvas));
        });

        canvas.addEventListener('mousedown', function(e) {
            if (mouseDownHandler) mouseDownHandler(makeEvent(e, canvas));
        });

        // Render loop
        function renderLoop() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            for (let i = 0; i < elements.length; i++) {
                if (elements[i].visible !== false) {
                    elements[i].draw(ctx);
                }
            }
            requestAnimationFrame(renderLoop);
        }
        renderLoop();

        // Expose globals
        window.getWidth = getWidth;
        window.getHeight = getHeight;
        window.Color = Color;
        window.Keyboard = Keyboard;
        window.Randomizer = Randomizer;
        window.Rectangle = Rectangle;
        window.Text = Text;
        window.WebImage = WebImage;
        window.add = add;
        window.remove = remove;
        window.removeAll = removeAll;
        window.getElementAt = getElementAt;
        window.setTimer = setTimer;
        window.stopTimer = stopTimer;
        window.keyDownMethod = keyDownMethod;
        window.mouseMoveMethod = mouseMoveHandler;
        window.mouseDownMethod = mouseDownMethod;

        // Override to ensure they're set after page load
        window.keyDownMethod = function(fn) { keyDownHandler = fn; };
        window.mouseMoveMethod = function(fn) { mouseMoveHandler = fn; };
        window.mouseDownMethod = function(fn) { mouseDownHandler = fn; };
    })();
    </script>

    <script src="default.js"></script>
</body>
</html>
